<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent sleep / screensaver on kiosk displays -->
    <meta name="screen-wake-lock" content="screen" />
    <title>ADS-B Display</title>
    <!-- Preload fonts for crisp rendering from the start -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Prevent flash of unstyled content before React mounts */
      body { background: #090e14; }
    </style>
  </head>
  <body>
    <div id="root" style="cursor: none;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
